<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS Global S.r.l.</title>
<meta name="description" content="EBS Global S.r.l. - Il sito è in fase di rinnovamento.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --deep-teal: #0e4c5f;
    --mid-blue: #1fa8e0;
    --sky: #7fe0fb;
    --mist: #eef4f6;
    --paper: #fbfdfe;
    --ink: #0b3646;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
  }

  body{
    font-family:'Montserrat', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient arcs echoing the logo's swoosh */
  .arcs{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .arcs svg{
    position:absolute;
    opacity:0.5;
  }
  .arc-top{
    top:-28vw;
    left:-22vw;
    width:70vw;
    min-width:520px;
  }
  .arc-bottom{
    bottom:-30vw;
    right:-24vw;
    width:60vw;
    min-width:460px;
    transform:rotate(180deg);
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:6vh 6vw 4vh;
    position:relative;
    z-index:1;
  }

  .logo{
    width:min(360px, 50vw);
    height:auto;
    margin-bottom:clamp(2.2rem, 5vh, 3.5rem);
    filter: drop-shadow(0 6px 18px rgba(14,76,95,0.10));
  }

  .message{
    font-family:'Caveat', cursive;
    font-weight:600;
    color: var(--deep-teal);
    font-size: clamp(2.4rem, 6vw, 4.6rem);
    line-height:1.15;
    max-width:16ch;
    letter-spacing:0.3px;
  }

  .message .accent{
    display:block;
    color: var(--mid-blue);
    font-size:0.7em;
    margin-top:0.15em;
  }

  .subtitle{
    margin-top:1.6rem;
    font-family:'Montserrat', sans-serif;
    font-weight:400;
    font-size:clamp(0.85rem, 1.6vw, 1rem);
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:#4c7987;
  }

  .subtitle::before,
  .subtitle::after{
    content:'';
    display:inline-block;
    width:28px;
    height:1px;
    background:#a9c9d1;
    vertical-align:middle;
    margin:0 12px;
  }

  footer{
    position:relative;
    z-index:1;
    background: linear-gradient(100deg, var(--deep-teal) 0%, #12617a 100%);
    color:#eaf6fa;
    padding:1.8rem 6vw;
  }

  .footer-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:1.2rem 2rem;
  }

  .company-name{
    font-weight:700;
    font-size:1.05rem;
    letter-spacing:0.05em;
    color:#ffffff;
    white-space:nowrap;
  }

  .contacts{
    display:flex;
    flex-wrap:wrap;
    gap:1.4rem 2.2rem;
    font-size:0.92rem;
    font-weight:400;
    color:#d3ecf3;
  }

  .contacts span{
    display:inline-flex;
    align-items:center;
    gap:0.5em;
    white-space:nowrap;
  }

  .contacts svg{
    width:15px;
    height:15px;
    flex-shrink:0;
    opacity:0.9;
  }

  .contacts a{
    color:inherit;
    text-decoration:none;
  }
  .contacts a:hover{
    text-decoration:underline;
  }

  @media (max-width: 620px){
    .footer-inner{
      flex-direction:column;
      align-items:flex-start;
      text-align:left;
    }
    .contacts{
      flex-direction:column;
      gap:0.6rem;
    }
  }

  @media (prefers-reduced-motion: no-preference){
    .logo{
      animation: fadeUp 0.9s ease-out both;
    }
    .message{
      animation: fadeUp 0.9s ease-out 0.15s both;
    }
    .subtitle{
      animation: fadeUp 0.9s ease-out 0.3s both;
    }
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

  <div class="arcs" aria-hidden="true">
    <svg class="arc-top" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <circle cx="200" cy="200" r="190" fill="none" stroke="#e7ecee" stroke-width="14"/>
      <circle cx="185" cy="200" r="170" fill="none" stroke="#bdeaf8" stroke-width="14"/>
      <circle cx="170" cy="200" r="150" fill="none" stroke="#0e4c5f" stroke-width="16" stroke-dasharray="720" stroke-dashoffset="120"/>
    </svg>
    <svg class="arc-bottom" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <circle cx="200" cy="200" r="190" fill="none" stroke="#e7ecee" stroke-width="10"/>
      <circle cx="185" cy="200" r="168" fill="none" stroke="#7fe0fb" stroke-width="10"/>
    </svg>
  </div>

  <main>
    <img class="logo" src="logo.png" alt="EBS Global S.r.l.">
    <p class="message">Ci stiamo rifacendo<span class="accent">il look, a presto!</span></p>
    <p class="subtitle">Il nuovo sito è in arrivo</p>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="company-name">EBS GLOBAL S.R.L.</div>
      <div class="contacts">
        <span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Via Catania, 146 &ndash; 90141 Palermo
        </span>
        <span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <a href="tel:+39091432151">091 432151</a>
        </span>
        <span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
          <a href="mailto:info@ebsglobal.it">info@ebsglobal.it</a>
        </span>
      </div>
    </div>
  </footer>

</body>
</html>
